[package]
name = "deadswitch"
version = "0.1.0"
description = "Onchain inheritance & dead man's switch protocol on Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "deadswitch"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
test-mode = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = "0.30.1"
anchor-spl = "0.30.1"
